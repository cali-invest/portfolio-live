<!DOCTYPE html> <html lang="vi"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Portfolio Live</title> <style> body { font-family: Arial, sans-serif; margin: 40px; background: #f5f7fa; } h1 { color: #222; } .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); } table { width: 100%; border-collapse: collapse; background: white; } th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: center; } th { background: #2563eb; color: white; } </style> </head> <body> <h1>📈 Portfolio Live</h1> <div class="card"> <h2>Tổng quan</h2> <p>NAV: <span id="nav">Loading...</span></p> <p>Lợi nhuận: <span id="profit">Loading...</span></p> <p>Cập nhật: <span id="updated">Loading...</span></p> </div> <table> <thead> <tr> <th>Mã</th> <th>SL</th> <th>Giá vốn</th> <th>Giá hiện tại</th> <th>Lãi/Lỗ</th> </tr> </thead> <tbody id="positions"></tbody> </table> <script> async function loadPortfolio() { const response = await fetch('data.json'); const data = await response.json(); document.getElementById('nav').textContent = data.portfolio.nav.toLocaleString('vi-VN'); document.getElementById('profit').textContent = data.portfolio.profit.toLocaleString('vi-VN'); document.getElementById('updated').textContent = data.updated_at; const tbody = document.getElementById('positions'); tbody.innerHTML = ''; data.positions.forEach(stock => { tbody.innerHTML += ` <tr> <td>${stock.symbol}</td> <td>${stock.quantity.toLocaleString('vi-VN')}</td> <td>${stock.avg_price.toLocaleString('vi-VN')}</td> <td>${stock.current_price.toLocaleString('vi-VN')}</td> <td>${stock.profit.toLocaleString('vi-VN')}</td> </tr> `; }); } loadPortfolio(); setInterval(loadPortfolio, 600000); </script> </body> </html>
